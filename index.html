    <link href="https://fonts.googleapis.com" rel="preconnect"/>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0062FF",
                        accent: "#00D1FF",
                        dark: "#0A0A0A",
                        "surface-dark": "#121212",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                        body: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        '2xl': "1.5rem",
                        '3xl': "2rem",
                        '4xl': "2.5rem",
                    },
                },
            },
        };

    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-dark text-white font-body selection:bg-primary/30;
                min-height: 100dvh;
            }
        }
        @layer components {
            .immersive-gradient {
                background: radial-gradient(circle at 0% 0%, rgba(0, 98, 255, 0.15) 0%, transparent 50%),
                            radial-gradient(circle at 100% 100%, rgba(0, 209, 255, 0.1) 0%, transparent 50%),
                            linear-gradient(180deg, #0A0A0A 0%, #121212 100%);
            }
            .glass-card {
                @apply bg-white/5 backdrop-blur-xl border border-white/10;
            }
            .glassmorphic-icon {
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
                @apply backdrop-blur-md border border-white/10 shadow-[0_8px_32px_0_rgba(0,98,255,0.2)];
            }
            .glow-blue {
                @apply shadow-[0_0_20px_rgba(0,98,255,0.4)];
            }
            .gradient-text-blue {
                @apply bg-clip-text text-transparent bg-gradient-to-br from-accent to-primary;
            }
            .hide-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .hide-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        }
    </style>
