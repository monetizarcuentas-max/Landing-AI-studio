<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="100%" stop-color="#0088AA" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#001B3A" />
      <stop offset="100%" stop-color="#004488" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Network lines and dots -->
  <g stroke="#00D2FF" stroke-width="1" opacity="0.6">
    <line x1="150" y1="40" x2="180" y2="30" />
    <line x1="150" y1="40" x2="170" y2="70" />
    <line x1="170" y1="70" x2="190" y2="60" />
    
    <line x1="50" y1="160" x2="20" y2="170" />
    <line x1="50" y1="160" x2="30" y2="130" />
    <line x1="30" y1="130" x2="10" y2="140" />
  </g>
  
  <g fill="#00D2FF">
    <circle cx="150" cy="40" r="4" />
    <circle cx="180" cy="30" r="6" />
    <circle cx="170" cy="70" r="3" />
    <circle cx="190" cy="60" r="5" />
    
    <circle cx="50" cy="160" r="4" fill="#001B3A" />
    <circle cx="20" cy="170" r="6" />
    <circle cx="30" cy="130" r="3" />
    <circle cx="10" cy="140" r="5" fill="#001B3A" />
  </g>

  <!-- Top curve of S (Cyan) -->
  <path d="M140 60 C 140 20, 60 20, 60 60 C 60 90, 100 100, 120 110" 
        stroke="url(#cyan-grad)" stroke-width="35" stroke-linecap="round" fill="none" filter="url(#shadow)"/>
        
  <!-- Bottom curve of S (Dark Blue) -->
  <path d="M80 90 C 100 100, 140 110, 140 140 C 140 180, 60 180, 60 140" 
        stroke="url(#blue-grad)" stroke-width="35" stroke-linecap="round" fill="none" filter="url(#shadow)"/>
</svg>
